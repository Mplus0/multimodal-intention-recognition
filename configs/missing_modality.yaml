experiment:
  name: missing_modality_baseline
  model_type: baseline
  seed: 42

dataset_split:
  train:
    - user_A
    - user_B
  test:
    - user_C

modalities:
  - imu
  - gesture
  - audio
  - text
  - scene

missing_modality:
  single:
    - [imu]
    - [gesture]
    - [audio]
    - [text]
    - [scene]
  pairs:
    - [imu, gesture]
    - [imu, audio]
    - [imu, text]
    - [imu, scene]
    - [gesture, audio]
    - [gesture, text]
    - [gesture, scene]
    - [audio, text]
    - [audio, scene]
    - [text, scene]

outputs:
  metrics: results/metrics/
  logs: results/logs/
  predictions: results/predictions/
  figures: figures/

notes:
  - This config is only for missing-modality baseline experiments.
  - It provides configuration for future run_missing_baseline.py.
  - Do not include improved_model settings.
  - Do not fill or assume experiment results in this config.
